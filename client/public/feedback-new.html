<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="app-version" content="1.6.0" />
    <title>Submit Feedback - Todos</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/public/feedback-page.css" />
  </head>
  <body>
    <div class="feedback-standalone">
      <div class="feedback-standalone__header">
        <a data-navigate="/app" class="feedback-standalone__back" href="/app"
          >&larr; Workspace</a
        >
        <span class="feedback-standalone__logo">Todos</span>
      </div>

      <h2>Submit feedback</h2>
      <p class="feedback-standalone__lede">
        Share bugs, rough edges, or ideas. Your submissions are reviewed by the
        team &mdash; you'll see fixes in future updates.
      </p>

      <div
        class="message"
        id="feedbackMessage"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <div id="feedbackConfirmation" class="feedback-confirmation" hidden>
        <h3 id="feedbackConfirmationTitle">Feedback sent</h3>
        <p id="feedbackConfirmationBody"></p>
        <p
          id="feedbackConfirmationMeta"
          class="feedback-confirmation__meta"
        ></p>
        <div class="feedback-confirmation__actions">
          <a
            data-navigate="/feedback"
            href="/feedback"
            class="btn btn-secondary"
            >View your submissions</a
          >
          <button type="button" class="btn btn-secondary" id="sendAnotherBtn">
            Send another
          </button>
        </div>
      </div>

      <form id="feedbackForm">
        <div class="feedback-grid">
          <div class="feedback-card">
            <div class="form-group">
              <label for="feedbackType">Submission type</label>
              <select id="feedbackType">
                <option value="bug">Bug report</option>
                <option value="feature">Feature request</option>
              </select>
            </div>
            <div class="form-group">
              <label for="feedbackTitle">Title</label>
              <input
                id="feedbackTitle"
                type="text"
                maxlength="200"
                required
                placeholder="Short summary"
              />
            </div>
            <div class="form-group">
              <label id="feedbackQuestionOneLabel" for="feedbackQuestionOne"
                >What happened?</label
              >
              <textarea id="feedbackQuestionOne" rows="4" required></textarea>
            </div>
            <div class="form-group">
              <label id="feedbackQuestionTwoLabel" for="feedbackQuestionTwo"
                >What did you expect?</label
              >
              <textarea id="feedbackQuestionTwo" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label id="feedbackQuestionThreeLabel" for="feedbackQuestionThree"
                >What were you doing right before it happened?</label
              >
              <textarea id="feedbackQuestionThree" rows="4"></textarea>
            </div>
          </div>

          <aside class="feedback-card feedback-card--context">
            <h3>Optional screenshot</h3>
            <div class="form-group">
              <label for="feedbackScreenshotUrl">Screenshot URL</label>
              <input
                id="feedbackScreenshotUrl"
                type="url"
                inputmode="url"
                placeholder="https://example.com/screenshot.png"
              />
            </div>

            <h3>Captured context</h3>
            <dl class="feedback-context-list">
              <div class="feedback-context-row">
                <dt>Current page</dt>
                <dd id="feedbackContextPage"></dd>
              </div>
              <div class="feedback-context-row">
                <dt>App version</dt>
                <dd id="feedbackContextVersion"></dd>
              </div>
              <div class="feedback-context-row">
                <dt>User</dt>
                <dd id="feedbackContextUser"></dd>
              </div>
            </dl>

            <button type="submit" class="btn feedback-submit-btn">
              Send feedback
            </button>
          </aside>
        </div>
      </form>
    </div>

    <script src="/utils/authSession.js"></script>
    <script src="/utils/apiClient.js"></script>
    <script src="/utils/utils.js"></script>
    <script src="/utils/standaloneTransitions.js"></script>
    <script src="/public/feedback-new-page.js"></script>
  </body>
</html>
