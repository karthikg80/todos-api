<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Feedback - Todos</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/public/feedback-page.css" />
  </head>
  <body>
    <div class="feedback-standalone">
      <div class="feedback-standalone__header">
        <a data-navigate="/app" class="feedback-standalone__back" href="/app"
          >&larr; Workspace</a
        >
        <span class="feedback-standalone__logo">Todos</span>
      </div>

      <h2>Your submissions</h2>
      <p class="feedback-standalone__lede">
        Track the status of bugs and ideas you've shared with the team.
      </p>

      <div
        class="message"
        id="feedbackMessage"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <div id="feedbackListContainer">
        <div class="loading">
          <div class="spinner"></div>
          Loading&hellip;
        </div>
      </div>

      <div class="feedback-standalone__actions">
        <a data-navigate="/feedback/new" href="/feedback/new" class="btn"
          >Submit feedback</a
        >
      </div>
    </div>

    <script src="/utils/authSession.js"></script>
    <script src="/utils/apiClient.js"></script>
    <script src="/utils/utils.js"></script>
    <script src="/utils/standaloneTransitions.js"></script>
    <script src="/public/feedback-list-page.js"></script>
  </body>
</html>
