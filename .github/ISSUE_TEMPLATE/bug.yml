name: Bug
description: Report a product or engineering defect
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for defects and regressions.
        GitHub Issues are the source of truth for bug state and follow-up.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
      placeholder: Describe the defect in one or two sentences.
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happens today?
      placeholder: Describe the current observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: Describe the intended behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the shortest reliable repro.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References / screenshots
      description: Add logs, screenshots, links, or other context.
      placeholder: Paste links or attach screenshots here.
  - type: dropdown
    id: severity
    attributes:
      label: Severity / impact
      description: How bad is the bug?
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What proves the bug is fixed?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: suggested-agent
    attributes:
      label: Suggested agent
      description: Who should take the first pass?
      options:
        - Codex
        - Claude
        - Human
    validations:
      required: true
  - type: dropdown
    id: brief-required
    attributes:
      label: Brief required?
      description: Does fixing this bug require a durable brief or protocol update?
      options:
        - "No"
        - "Yes"
    validations:
      required: true
