name: todos-api

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todos_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todos_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    # Explicit Docker volume name — persists across `docker compose up/down`; see `docker volume ls`.
    name: todos-api_postgres_data
